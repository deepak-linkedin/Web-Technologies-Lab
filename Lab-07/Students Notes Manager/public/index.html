<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Notes Manager</title>
</head>
<body>
    <h2>Add Note</h2>

    <input id="title" placeholder="Title"><br><br>

    <input id="subject" placeholder="Subject"><br><br>

    <textarea id="description" placeholder="Description"></textarea><br><br>

    <button onclick="addNote()">Add Note</button><br><br>

    <h2>All Notes</h2>
    <button onclick="loadNotes()">View Notes</button><br><br>

    <div id="notes"></div>

    <script src="script.js"></script>

</body>
</html>
